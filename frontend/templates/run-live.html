<div id="run-live-panel"class="card hidden">
    <div class="card-header">
        Live Logs
    </div>
    <div class="card-body">
        <div class="mb-2">
            Status:
            <span id="live-status">
                DISCONNECTED
            </span>
        </div>
        <div class="mb-3">
            <progress
                id="live-progress"
                max="100"
                value="0"
                style="width:100%"
            ></progress>
        </div>
        <pre
            id="live-logs"
            style="
                height:500px;
                overflow:auto;
                background:#111;
                color:#ddd;
                padding:10px;
            "
        ></pre>
    </div>
</div>
